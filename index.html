<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>小郭和小朱的世界</title>
<style>
/* 全局重置 */
*{margin:0;padding:0;box-sizing:border-box;font-family:"Microsoft YaHei", "STKaiti", "KaiTi", sans-serif;}
body{overflow-x:hidden;background:#fdfbfb;}

/* 欢迎页 - 双端适配 */
.welcome-page{
  width:100vw;
  height:100vh;
  background: linear-gradient(135deg, #ffeff8 0%, #e8f4ff 100%);
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  position:fixed;
  top:0;
  left:0;
  z-index:9999;
  padding:0 20px;
}
.welcome-title{
  font-size: clamp(24px, 4vw, 48px);
  color: #ff69b4;
  text-align:center;
  margin-bottom:40px;
  letter-spacing:8px;
  font-weight:bold;
  text-shadow: 0 2px 10px rgba(255,105,180,0.3);
}
.enter-btn{
  padding: clamp(12px, 2vw, 18px) clamp(30px, 5vw, 60px);
  background: linear-gradient(90deg, #ff69b4 0%, #87cefa 100%);
  border:none;
  border-radius: 50px;
  color:white;
  font-size: clamp(16px, 2vw, 24px);
  font-weight:bold;
  cursor:pointer;
  box-shadow: 0 8px 15px rgba(255,105,180,0.3);
  transition: all 0.3s ease;
  position: relative;
  overflow: hidden;
}
.enter-btn:hover{
  transform: translateY(-5px);
  box-shadow: 0 12px 20px rgba(255,105,180,0.4);
}
/* 按钮装饰 */
.enter-btn::before{
  content: "💖";
  position: absolute;
  left: 15px;
  top: 50%;
  transform: translateY(-50%);
  font-size: 18px;
}
.enter-btn::after{
  content: "💖";
  position: absolute;
  right: 15px;
  top: 50%;
  transform: translateY(-50%);
  font-size: 18px;
}

/* 装饰漂浮元素 */
.decoration{position:absolute;opacity:0.7;pointer-events: none;}
.star{font-size:20px;color:#ffd700;animation: float 3s ease-in-out infinite;}
.heart{font-size:18px;color:#ff69b4;animation: float 4s ease-in-out infinite;}
.flower{font-size:22px;color:#ff9a9e;animation: float 5s ease-in-out infinite;}
@keyframes float {
  0% {transform: translateY(0) rotate(0deg);}
  50% {transform: translateY(-20px) rotate(5deg);}
  100% {transform: translateY(0) rotate(0deg);}
}

/* 主页面 - 电脑端 2+2 排版：核心调整行高 */
.main-page{
  display:none;
  min-height:100vh;
  padding:20px;
  background:linear-gradient(120deg,#fdfbfb 0%,#ebedee 100%);
}
@media (min-width:769px) {
  .page-grid{
    display:grid;
    grid-template-columns: 1fr 1fr;
    grid-template-rows: 550px 300px;
    gap:20px;
    max-width:1200px;
    margin:0 auto;
  }
}
@media (max-width:768px) {
  .page-grid{
    display:grid;
    grid-template-columns: 1fr;
    grid-template-rows: auto auto auto auto;
    gap:15px;
  }
}

/* 卡片通用样式 - 优化为更圆润可爱 */
.grid-card{
  border-radius:24px; /* 更圆润的圆角 */
  padding:20px;
  box-shadow:0 8px 20px rgba(255,105,180,0.08); /* 柔和的粉色阴影 */
  background:#fff;
  overflow:hidden;
  position:relative;
  min-height:380px;
  border: 1px solid #fff0f5; /* 浅粉色边框 */
  transition: all 0.3s ease;
}
/* 卡片悬浮效果 */
.grid-card:hover{
  transform: translateY(-5px);
  box-shadow:0 12px 25px rgba(255,105,180,0.12);
}

/* 卡片装饰元素 */
.grid-card::before{
  content: "💘";
  position: absolute;
  top: 10px;
  right: 10px;
  font-size: 18px;
  opacity: 0.5;
}

/* 纪念日卡片 - 拉长高度，保证内容完整 */
.date-card{
  background:#fff0f5; /* 更柔和的粉色背景 */
  border:1px solid #ffd1dc; /* 浅粉色边框 */
  display:flex;
  flex-direction:column;
  min-height:550px;
}
.title{
  color:#e63946;
  text-align:center;
  margin-bottom:20px;
  font-size:18px;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:8px;
  position: relative;
}
/* 标题装饰 */
.title::before, .title::after{
  content: "";
  display: inline-block;
  width: 40px;
  height: 2px;
  background: linear-gradient(90deg, transparent, #ff69b4, transparent);
  margin: 0 10px;
}

.input-item{display:none;} /* 隐藏输入框 */

.date-display{
  margin-top:20px;
  flex:1;
  overflow-y:auto;
  max-height:350px;
  padding-right:4px;
}
.date-card-item{
  padding:12px;
  border-radius:16px; /* 更圆润 */
  background:#ffffff;
  margin-bottom:10px;
  box-shadow:0 2px 8px rgba(255,105,180,0.1);
  transition: all 0.2s ease;
}
/* 日期项悬浮效果 */
.date-card-item:hover{
  transform: translateX(5px);
  box-shadow:0 4px 12px rgba(255,105,180,0.15);
}
.date-card-item h4{
  color:#ff69b4;
  font-size:16px;
  margin-bottom:8px;
  display: flex;
  align-items: center;
  gap: 5px;
}
/* 给日期标题加小图标 */
.date-card-item h4::before{
  content: "💖";
  font-size: 14px;
  margin-right: 5px;
}
.date-card-item p{
  font-size:14px;
  color:#555;
  line-height:1.6;
  margin-bottom:4px;
}
.countdown{
  padding:15px;
  border-radius:16px;
  background:#ffebf0;
  margin-top:10px;
  text-align:center;
  margin-bottom:10px;
  border: 1px solid #ffccd5;
}
.countdown h4{
  color:#d62828;
  margin-bottom:8px;
  font-size:14px;
}
.countdown-text{
  font-size:16px;
  font-weight:700;
  color:#d62828;
  text-shadow: 0 1px 3px rgba(214,40,40,0.2);
}

/* 照片区卡片 */
.photo-card{
  background:#f8f0f8;
  display:flex;
  flex-direction:column;
}
.photo-title{
  color:#e63946;
  text-align:center;
  margin-bottom:15px;
  font-size:18px;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:8px;
}
/* 照片标题装饰 */
.photo-title::before, .photo-title::after{
  content: "";
  display: inline-block;
  width: 40px;
  height: 2px;
  background: linear-gradient(90deg, transparent, #ff69b4, transparent);
  margin: 0 10px;
}
.photo-show{
  flex:1;
  width:100%;
  position:relative;
  border-radius:16px; /* 更圆润 */
  overflow:hidden;
  background:#f9f9f9;
  min-height:280px;
  border: 2px solid #fff0f5;
}
.photo-slide{
  position:absolute;
  inset:0;
  display:flex;
  gap:8px;
  padding:8px;
  opacity:0;
  transition:opacity 0.8s ease;
}
.photo-slide.active{opacity:1}
.photo-item{
  flex:1;
  display:flex;
  align-items:center;
  justify-content:center;
  border-radius:12px;
  overflow:hidden;
  background:#fff;
}
.photo-item img{
  max-width:100%;
  max-height:100%;
  object-fit:contain;
  transition: all 0.3s ease;
}
.photo-item img:hover{
  transform: scale(1.02);
}

/* 装饰区卡片 - 压缩高度到原来一半，内容排版不变 */
.decor-card{
  background:#fef7fb;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  padding:20px 15px;
  min-height:300px;
}
.decor-title{
  color:#e63946;
  margin-bottom:20px;
  font-size:18px;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:8px;
}
/* 装饰标题装饰 */
.decor-title::before, .decor-title::after{
  content: "";
  display: inline-block;
  width: 40px;
  height: 2px;
  background: linear-gradient(90deg, transparent, #ff69b4, transparent);
  margin: 0 10px;
}
/* 散列布局容器 */
.decor-area{
  flex:1;
  width:100%;
  height:100%;
  position:relative;
  max-width:400px;
}
/* 装饰图片 - 大小和位置保持不变 */
.decor-item{
  position:absolute;
  object-fit:contain;
  cursor:pointer;
  transition: all 0.3s ease;
  box-shadow:0 4px 12px rgba(255,105,180,0.15);
  border-radius:50%; /* 圆形装饰 */
  border: 2px solid #fff;
}
/* 第1个：左上 */
.decor-item:nth-child(1){
  width: 70px;
  height: 70px;
  top: 8%;
  left: 8%;
  transform: rotate(-6deg);
}
/* 第2个：右上 */
.decor-item:nth-child(2){
  width: 65px;
  height: 65px;
  top: 12%;
  right: 10%;
  transform: rotate(5deg);
}
/* 第3个：中间 */
.decor-item:nth-child(3){
  width: 75px;
  height: 75px;
  top: 45%;
  left: 50%;
  transform: translate(-50%, -50%) rotate(-2deg);
  z-index: 2;
}
/* 第4个：左下 */
.decor-item:nth-child(4){
  width: 60px;
  height: 60px;
  bottom: 15%;
  left: 12%;
  transform: rotate(8deg);
}
/* 第5个：右下 */
.decor-item:nth-child(5){
  width: 68px;
  height: 68px;
  bottom: 10%;
  right: 15%;
  transform: rotate(-4deg);
}
/* hover动效 */
.decor-item:hover{
  transform: rotate(0deg) scale(1.2);
  box-shadow:0 6px 18px rgba(255,105,180,0.25);
  z-index:10;
}

/* 留言区卡片 */
.words-card{
  background:#fff0f5;
  border:1px solid #ffd1dc;
  display:flex;
  flex-direction:column;
}
.words-title{
  color:#e63946;
  text-align:center;
  margin-bottom:15px;
  font-size:18px;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:8px;
}
/* 留言标题装饰 */
.words-title::before, .words-title::after{
  content: "";
  display: inline-block;
  width: 40px;
  height: 2px;
  background: linear-gradient(90deg, transparent, #ff69b4, transparent);
  margin: 0 10px;
}
#wordsInput{
  flex:1;
  width:100%;
  padding:12px;
  border:1px solid #ffd1dc;
  border-radius:16px;
  resize:none;
  font-size:14px;
  margin-bottom:10px;
  background:#ffffff;
  transition: all 0.2s ease;
}
#wordsInput:focus{
  outline: none;
  border-color: #ff69b4;
  box-shadow:0 0 8px rgba(255,105,180,0.2);
}
.words-btn-group{display:flex;gap:10px}
.btn-save-words,.btn-clear{
  flex:1;
  padding:10px;
  border:none;
  border-radius:16px;
  font-size:14px;
  cursor:pointer;
  transition: all 0.2s ease;
}
.btn-save-words{
  background: linear-gradient(90deg, #ff69b4, #ff87b2);
  color:#fff;
  box-shadow:0 2px 8px rgba(255,105,180,0.2);
}
.btn-save-words:hover{
  transform: translateY(-2px);
  box-shadow:0 4px 12px rgba(255,105,180,0.3);
}
.btn-clear{
  background:#f8f8f8;
  color:#666;
  border:1px solid #eee;
}
.btn-clear:hover{
  background:#f0f0f0;
}
.words-list{
  margin-top:10px;
  flex:1;
  overflow-y:auto;
}
.words-item{
  padding:10px;
  border-radius:16px;
  background:#ffffff;
  margin-bottom:8px;
  font-size:14px;
  color:#555;
  box-shadow:0 2px 8px rgba(255,105,180,0.1);
}
.words-item p:last-child{
  font-size:12px;
  color:#999;
  margin-top:5px;
}

/* BGM播放器 - 优化样式 */
.bgm-control{
  position:fixed;
  bottom:20px;
  right:20px;
  background:rgba(255,255,255,.98);
  padding:15px;
  border-radius:20px;
  box-shadow:0 5px 15px rgba(255,105,180,0.15);
  z-index:999;
  min-width:200px;
  text-align:center;
  border:1px solid #fff0f5;
}
#bgmTitle{
  font-size:14px;
  color:#ff69b4;
  margin-bottom:8px;
  font-weight:bold;
}
.bgm-btn{
  background: linear-gradient(90deg, #ff69b4, #ff87b2);
  color:#fff;
  border:none;
  border-radius:12px;
  padding:8px 12px;
  margin:0 5px;
  cursor:pointer;
  font-size:13px;
  transition: all 0.2s ease;
}
.bgm-btn:hover{
  transform: translateY(-2px);
  box-shadow:0 2px 8px rgba(255,105,180,0.2);
}

/* 手机端适配：保持比例 */
@media (max-width:768px){
  .grid-card{min-height:350px;border-radius:20px;}
  .date-card{min-height:500px;}
  .date-display{max-height:300px;}
  .decor-card{min-height:200px;}
  .bgm-control{bottom:10px;right:10px;padding:10px;border-radius:16px;}
  .welcome-title{letter-spacing:4px;}
  .photo-show{min-height:220px;border-radius:12px;}
  /* 手机端装饰图片大小不变 */
  .decor-item:nth-child(1){width:55px;height:55px;}
  .decor-item:nth-child(2){width:50px;height:50px;}
  .decor-item:nth-child(3){width:60px;height:60px;}
  .decor-item:nth-child(4){width:45px;height:45px;}
  .decor-item:nth-child(5){width:52px;height:52px;}
  
  /* 手机端标题装饰简化 */
  .title::before, .title::after,
  .photo-title::before, .photo-title::after,
  .decor-title::before, .decor-title::after,
  .words-title::before, .words-title::after{
    width: 20px;
  }
}

/* 新增：页面漂浮装饰 */
.floating-decoration{
  position: fixed;
  pointer-events: none;
  z-index: 100;
  opacity: 0.6;
}
.heart-float{
  font-size: 16px;
  color: #ff69b4;
  animation: float-heart 6s ease-in-out infinite;
}
.star-float{
  font-size: 14px;
  color: #ffd700;
  animation: float-star 7s ease-in-out infinite;
}
.flower-float{
  font-size: 18px;
  color: #ff9a9e;
  animation: float-flower 8s ease-in-out infinite;
}
@keyframes float-heart {
  0% {transform: translateY(100vh) rotate(0deg); opacity: 0;}
  10% {opacity: 0.8;}
  90% {opacity: 0.8;}
  100% {transform: translateY(-100px) rotate(720deg); opacity: 0;}
}
@keyframes float-star {
  0% {transform: translateY(100vh) rotate(0deg); opacity: 0;}
  10% {opacity: 0.8;}
  90% {opacity: 0.8;}
  100% {transform: translateY(-100px) rotate(-720deg); opacity: 0;}
}
@keyframes float-flower {
  0% {transform: translateY(100vh) rotate(0deg); opacity: 0;}
  10% {opacity: 0.8;}
  90% {opacity: 0.8;}
  100% {transform: translateY(-100px) rotate(360deg); opacity: 0;}
}
</style>
</head>
<body>

<!-- Firebase 配置和初始化 -->
<script type="module">
  // 引入 Firebase 核心和 Firestore 模块
  import { initializeApp } from "https://cdn.jsdelivr.net/npm/firebase-app@12.10.0/dist/firebase-app.esm.js";

</script>


<!-- 欢迎页 -->
<div class="welcome-page" id="welcomePage">
  <div class="decoration star" style="top:20%;left:10%;animation-delay:0s">⭐</div>
  <div class="decoration heart" style="top:15%;right:15%;animation-delay:0.5s">❤️</div>
  <div class="decoration star" style="bottom:25%;left:20%;animation-delay:1s">✨</div>
  <div class="decoration heart" style="bottom:30%;right:25%;animation-delay:1.5s">💓</div>
  <div class="decoration flower" style="top:40%;left:30%;animation-delay:2s">🌸</div>
  
  <h1 class="welcome-title">欢迎进入小郭和小朱的世界</h1>
  <button class="enter-btn" onclick="enterMainPage()">点击进入</button>
</div>

<!-- 主页面 -->
<div class="main-page" id="mainPage">
  <div class="page-grid">
    <!-- 上排左：纪念日（拉长） -->
    <div class="grid-card date-card">
      <h3 class="title">❤️ 我们的纪念日 ❤️</h3>
      <!-- 输入框已隐藏，不再显示 -->
      <div class="date-display" id="dateDisplay"></div>
      <div class="countdown" id="countdownCard" style="display:none">
        <h4>距离下一个结婚纪念日</h4>
        <div class="countdown-text" id="countdownText"></div>
      </div>
    </div>

    <!-- 上排右：照片区 -->
    <div class="grid-card photo-card">
      <h3 class="photo-title">📸 我们的瞬间 📸</h3>
      <div class="photo-show" id="photoShow"></div>
    </div>

    <!-- 下排左：装饰区（压缩高度） -->
    <div class="grid-card decor-card">
      <h3 class="decor-title">✨ 甜蜜装饰 ✨</h3>
      <div class="decor-area">
        <img src="icon/1.png" class="decor-item" alt="装饰1">
        <img src="icon/2.png" class="decor-item" alt="装饰2">
        <img src="icon/3.png" class="decor-item" alt="装饰3">
        <img src="icon/4.png" class="decor-item" alt="装饰4">
        <img src="icon/5.png" class="decor-item" alt="装饰5">
      </div>
    </div>

    <!-- 下排右：甜蜜语录 -->
    <div class="grid-card words-card">
      <h3 class="words-title">💬 甜蜜语录 💬</h3>
      <textarea id="wordsInput" placeholder="写下想对TA说的话💖"></textarea>
      <div class="words-btn-group">
        <button class="btn-save-words" onclick="saveWords()">保存语录</button>
        <button class="btn-clear" onclick="clearWords()">清空</button>
      </div>
      <div class="words-list" id="wordsList"></div>
    </div>
  </div>

  <!-- BGM播放器 -->
  <div class="bgm-control">
    <div id="bgmTitle">🎵 正在加载...</div>
    <div>
      <button class="bgm-btn" onclick="playBGM()">播放</button>
      <button class="bgm-btn" onclick="pauseBGM()">暂停</button>
      <button class="bgm-btn" onclick="nextBGM()">下一首</button>
    </div>
  </div>
</div>

<audio id="bgmPlayer" onended="nextBGM()"></audio>

<script>
// ===================== 配置区（只改这里）=====================
const photoList = [
  "photos/1.jpg",
  "photos/2.jpg",
  "photos/3.jpg",
  "photos/4.jpg",
  "photos/5.jpg",
  "photos/6.jpg",
  "photos/7.jpg",
  "photos/8.jpg",
  "photos/9.jpg",
  "photos/10.jpg",
  "photos/11.jpg",
  "photos/12.jpg",
  "photos/13.jpg",
  "photos/14.jpg",
  "photos/15.jpg",
  "photos/16.jpg"
];

const bgmList = [
  "music/天外来物.mp3",
  "music/像晴天像雨天.mp3",
  "music/一笑倾城.mp3"
];

// 固定的纪念日日期
const LOVE_DATE = "2017-06-08";    // 相恋日期
const LICENSE_DATE = "2025-08-15"; // 领证日期
const MARRY_DATE = "2025-10-28";   // 结婚日期
// ===========================================================

let currentBgmIndex = 0;
const bgmPlayer = document.getElementById("bgmPlayer");
let countdownTimer = null;

// 创建漂浮装饰
function createFloatingDecorations() {
  const decorations = ['💖', '✨', '🌸', '💘', '🥰', '💝'];
  const types = ['heart-float', 'star-float', 'flower-float'];
  
  setInterval(() => {
    const decor = document.createElement('div');
    decor.className = `floating-decoration ${types[Math.floor(Math.random() * types.length)]}`;
    decor.textContent = decorations[Math.floor(Math.random() * decorations.length)];
    decor.style.left = `${Math.random() * 100}vw`;
    decor.style.animationDelay = `${Math.random() * 5}s`;
    document.body.appendChild(decor);
    
    // 移除装饰
    setTimeout(() => {
      decor.remove();
    }, 8000);
  }, 1500);
}

function enterMainPage() {
  document.getElementById("welcomePage").style.display = "none";
  document.getElementById("mainPage").style.display = "block";
  
  loadPhotosTwoAtOnce();
  loadFixedDates();
  loadSavedWords(); // 加载云端留言
  
  randomFirstSong();
  showCurrentSongName();
  playBGM();
  
  // 创建漂浮装饰
  createFloatingDecorations();
}

function randomFirstSong() {
  currentBgmIndex = Math.floor(Math.random() * bgmList.length);
}

function showCurrentSongName() {
  const path = bgmList[currentBgmIndex];
  const name = path.split("/").pop().replace(".mp3", "");
  document.getElementById("bgmTitle").textContent = `🎵 ${name}`;
}

function playBGM() {
  bgmPlayer.src = bgmList[currentBgmIndex];
  bgmPlayer.play().catch(err => {
    console.log("播放失败：", err);
    alert("BGM播放失败，请检查文件路径是否正确～");
  });
  showCurrentSongName();
}

function pauseBGM() {
  bgmPlayer.pause();
}

function nextBGM() {
  currentBgmIndex = (currentBgmIndex + 1) % bgmList.length;
  playBGM();
}

let photoSlideIndex = 0;
let slides = [];
function loadPhotosTwoAtOnce() {
  const photoShow = document.getElementById("photoShow");
  photoShow.innerHTML = "";
  slides = [];

  for (let i=0; i<photoList.length; i+=2) {
    const slide = document.createElement("div");
    slide.className = "photo-slide";
    
    let html = "";
    html += `<div class="photo-item"><img src="${photoList[i]}" onerror="this.parentElement.innerHTML='<div style=color:#999;>加载失败</div>'"></div>`;
    if (i+1 < photoList.length) {
      html += `<div class="photo-item"><img src="${photoList[i+1]}" onerror="this.parentElement.innerHTML='<div style=color:#999;>加载失败</div>'"></div>`;
    } else {
      html += `<div class="photo-item"></div>`;
    }
    slide.innerHTML = html;
    photoShow.appendChild(slide);
    slides.push(slide);
  }

  if (slides.length === 0) return;
  slides[0].classList.add("active");
  setInterval(() => {
    slides[photoSlideIndex].classList.remove("active");
    photoSlideIndex = (photoSlideIndex + 1) % slides.length;
    slides[photoSlideIndex].classList.add("active");
  }, 4000);
}

// 加载固定的纪念日
function loadFixedDates() {
  // 计算已共度天数
  function calcDays(dateStr) {
    if(!dateStr) return 0;
    const date = new Date(dateStr);
    const now = new Date();
    const diffTime = Math.abs(now - date);
    return Math.floor(diffTime / (1000 * 60 * 60 * 24));
  }
  
  // 渲染纪念日列表
  let html = "";
  if(LOVE_DATE) html += `<div class="date-card-item"><h4>相恋</h4><p>❤️ ${LOVE_DATE}</p><p>已共度${calcDays(LOVE_DATE)}天</p></div>`;
  if(LICENSE_DATE) html += `<div class="date-card-item"><h4>领证</h4><p>💍 ${LICENSE_DATE}</p><p>已共度${calcDays(LICENSE_DATE)}天</p></div>`;
  if(MARRY_DATE) html += `<div class="date-card-item"><h4>结婚</h4><p>🎊 ${MARRY_DATE}</p><p>已共度${calcDays(MARRY_DATE)}天</p></div>`;
  document.getElementById("dateDisplay").innerHTML = html;
  
  // 清除旧的倒计时定时器
  if(countdownTimer) clearInterval(countdownTimer);
  
  // 显示结婚纪念日倒计时
  const targetDate = MARRY_DATE || LICENSE_DATE;
  if(targetDate) {
    document.getElementById("countdownCard").style.display = "block";
    // 定义倒计时更新函数
    function updateCountdown() {
      const now = new Date();
      const [year, month, day] = targetDate.split("-").map(Number);
      let nextAnni = new Date(now.getFullYear(), month - 1, day);
      if(nextAnni < now) nextAnni = new Date(now.getFullYear() + 1, month - 1, day);
      
      const diff = nextAnni - now;
      const days = Math.floor(diff / (1000 * 60 * 60 * 24));
      const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
      const mins = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
      const secs = Math.floor((diff % (1000 * 60)) / 1000);
      
      document.getElementById("countdownText").textContent = `${days}天 ${hours}时 ${mins}分 ${secs}秒`;
    }
    // 立即更新一次，再设置定时器
    updateCountdown();
    countdownTimer = setInterval(updateCountdown, 1000);
  } else {
    document.getElementById("countdownCard").style.display = "none";
  }
}

// 保存留言到Firebase云端
async function saveWords() {
  const text = document.getElementById("wordsInput").value.trim();
  if(!text) {
    alert("请输入想对TA说的话💖");
    return;
  }
  
  try {
    // 添加文档到Firebase Firestore
    const docRef = await window.firebaseAddDoc(
      window.firebaseCollection(window.firebaseDb, "sweetWords"), 
      {
        text: text,
        time: new Date().toLocaleString(),
        timestamp: new Date() // 添加时间戳用于排序
      }
    );
    
    console.log("留言已保存到云端，ID: ", docRef.id);
    document.getElementById("wordsInput").value = "";
    loadSavedWords(); // 重新加载留言列表
    
    // 提示保存成功
    alert("💖 甜蜜语录已保存到云端～");
  } catch (e) {
    console.error("保存留言失败: ", e);
    alert("保存失败，请稍后再试～");
  }
}

// 从Firebase云端加载留言
async function loadSavedWords() {
  try {
    // 创建查询，按时间戳降序排列
    const q = window.firebaseQuery(
      window.firebaseCollection(window.firebaseDb, "sweetWords"),
      window.firebaseOrderBy("timestamp", "desc")
    );
    
    // 获取所有留言
    const querySnapshot = await window.firebaseGetDocs(q);
    let html = "";
    
    if (querySnapshot.empty) {
      html = '<p style="text-align:center;color:#999;margin-top:20px;">暂无甜蜜语录~💖</p>';
    } else {
      querySnapshot.forEach((doc) => {
        const data = doc.data();
        html += `<div class="words-item" data-id="${doc.id}">
                  <p>${data.text}</p>
                  <p style="font-size:10px;color:#999;margin-top:5px;">${data.time}</p>
                </div>`;
      });
    }
    
    document.getElementById("wordsList").innerHTML = html;
  } catch (e) {
    console.error("加载留言失败: ", e);
    // 如果云端加载失败，尝试使用本地存储作为备用
    const localWords = JSON.parse(localStorage.getItem("sweetWords") || "[]");
    let html = "";
    
    if (localWords.length === 0) {
      html = '<p style="text-align:center;color:#999;margin-top:20px;">暂无甜蜜语录~💖</p>';
    } else {
      localWords.forEach(item => {
        html += `<div class="words-item"><p>${item.text}</p><p style="font-size:10px;color:#999;margin-top:5px;">${item.time}</p></div>`;
      });
    }
    
    document.getElementById("wordsList").innerHTML = html;
    alert("暂时无法连接云端，已加载本地留言～");
  }
}

// 清空云端留言
async function clearWords() {
  if(!confirm("确定要清空所有甜蜜语录吗？💔")) {
    return;
  }
  
  try {
    // 获取所有留言文档
    const q = window.firebaseQuery(
      window.firebaseCollection(window.firebaseDb, "sweetWords")
    );
    const querySnapshot = await window.firebaseGetDocs(q);
    
    // 批量删除所有文档
    const deletePromises = [];
    querySnapshot.forEach((doc) => {
      deletePromises.push(
        window.firebaseDeleteDoc(window.firebaseDoc(window.firebaseDb, "sweetWords", doc.id))
      );
    });
    
    await Promise.all(deletePromises);
    console.log("所有留言已从云端删除");
    
    // 同时清空本地存储
    localStorage.removeItem("sweetWords");
    
    // 重新加载留言列表
    loadSavedWords();
    alert("💔 所有甜蜜语录已清空～");
  } catch (e) {
    console.error("清空留言失败: ", e);
    alert("清空失败，请稍后再试～");
  }
}

// 页面加载完成后初始化
window.onload = function() {
  loadFixedDates();
  
  // 等待Firebase加载完成后再加载留言
  setTimeout(() => {
    loadSavedWords();
  }, 1000);
};
